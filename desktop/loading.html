<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoMind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
  }

  .container {
    text-align: center;
    max-width: 340px;
  }

  .logo {
    width: 72px;
    height: 72px;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: white;
    letter-spacing: -1px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  #status {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
    min-height: 22px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #1e293b;
    border-top-color: #8b5cf6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  #retry-btn {
    display: none;
    margin-top: 12px;
    padding: 10px 28px;
    background: #8b5cf6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  #retry-btn:hover {
    background: #7c3aed;
  }

  #error-detail {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    font-size: 12px;
    color: #ef4444;
    text-align: left;
    word-break: break-word;
  }

  #hint {
    display: none;
    margin-top: 12px;
    font-size: 11px;
    color: #64748b;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">CM</div>
    <h1>CryptoMind</h1>
    <p id="status">Starting services<span class="dots"></span></p>
    <div class="spinner" id="spinner"></div>
    <div id="error-detail"></div>
    <button id="retry-btn" onclick="location.reload()">Retry</button>
    <div id="hint">
      Make sure Python 3 and Node.js are installed.<br>
      Run <code style="color:#94a3b8">pip install -r requirements.txt</code> first.
    </div>
  </div>
</body>
</html>
