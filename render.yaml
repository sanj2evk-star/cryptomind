services:
  - type: web
    name: cryptomind
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd ..
    startCommand: python run_api.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_USERNAME
        value: admin
      - key: API_PASSWORD
        value: changeme
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.11.0"
    healthCheckPath: /health
    autoDeploy: true
    plan: free
