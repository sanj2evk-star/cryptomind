      // Unregister all service workers to prevent stale cache issues
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        // Clear all caches
        if ("caches" in window) {
